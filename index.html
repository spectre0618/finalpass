<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060C18">
<title>FinalPass</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #060C18;
  --surf-1:     #0A1424;
  --surf-2:     #0E1C32;
  --surf-3:     #122240;
  --border:     #1B3260;
  --border-hi:  #2A4D8A;
  --glow:       rgba(42,120,220,0.12);
  --text-1:     #EEF3FA;
  --text-2:     #5D8FBF;
  --text-3:     #2C5070;
  --accent:     #2A88DC;
  --accent-hi:  #4AABF5;
  --rwy:        #00CFFF;
  --rwy-dim:    rgba(0,207,255,0.15);
  --wind:       #7ED4FF;
  --good:       #00DDA8;
  --warn:       #FFB020;
  --danger:     #FF4050;
  --cat-vfr:    #00DDA8;
  --cat-mvfr:   #4AABF5;
  --cat-ifr:    #FFB020;
  --cat-lifr:   #FF4050;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* ── Background texture ─────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% -10%, rgba(30,80,160,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 80% 30% at 50% 110%, rgba(0,100,180,0.1) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── Top bar ────────────────────────────────────────────── */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 10px 16px;
  background: rgba(6,12,24,0.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.top-bar-left { display: flex; flex-direction: column; }

.tb-icao {
  font-family: 'Rajdhani', sans-serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text-1);
  line-height: 1;
}

.tb-name {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-top: 2px;
}

.search-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.search-btn:active { border-color: var(--accent); color: var(--accent-hi); }

/* ── Search overlay ─────────────────────────────────────── */
.search-overlay {
  position: fixed;
  inset: 0;
  background: rgba(6,12,24,0.97);
  z-index: 200;
  display: none;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  left: 50%;
  transform: translateX(-50%);
}
.search-overlay.open { display: flex; animation: slideIn 0.18s ease; }
@keyframes slideIn { from { opacity:0; transform: translateX(-50%) translateY(-8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

.search-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.search-input {
  flex: 1;
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-1);
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-3); font-weight: 400; font-size: 16px; letter-spacing: 0.04em; }

.cancel-btn {
  background: none;
  border: none;
  color: var(--text-2);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
  padding: 8px 4px;
  -webkit-tap-highlight-color: transparent;
}

.search-section-label {
  padding: 10px 16px 4px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
}

.search-results { flex: 1; overflow-y: auto; }

.search-result {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.search-result:active { background: var(--surf-2); }

.sr-icao {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--accent-hi);
}
.sr-name { font-size: 13px; color: var(--text-1); margin-top: 1px; }
.sr-city { font-size: 11px; color: var(--text-2); }

/* ── Main content ───────────────────────────────────────── */
.content {
  position: relative;
  z-index: 1;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Loading/error ──────────────────────────────────────── */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 14px;
}
.pulse-ring {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text-2); letter-spacing: 0.06em; }

/* ── Cards ──────────────────────────────────────────────── */
.card {
  background: var(--surf-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 50%);
  pointer-events: none;
  border-radius: inherit;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  background: var(--surf-2);
  border-bottom: 1px solid var(--border);
}
.card-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-3);
}
.card-tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--text-2);
}

/* ── Runway hero card ───────────────────────────────────── */
.rwy-hero {
  background: var(--surf-1);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}

.rwy-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--rwy), transparent);
  opacity: 0.5;
}

.rwy-body {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 16px;
}

.rwy-number-wrap { display: flex; flex-direction: column; align-items: flex-start; }
.rwy-number {
  font-family: 'Rajdhani', sans-serif;
  font-size: 80px;
  font-weight: 700;
  line-height: 0.9;
  letter-spacing: -0.02em;
  color: var(--rwy);
  text-shadow: 0 0 30px rgba(0,207,255,0.3);
}
.rwy-number-sub {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-top: 6px;
}

.rwy-stats {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
}
.rwy-stat { display: flex; flex-direction: column; align-items: flex-end; }
.rwy-stat-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
}
.rwy-stat-val {
  font-family: 'Rajdhani', sans-serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--text-1);
  line-height: 1.1;
}
.rwy-stat-unit { font-size: 12px; color: var(--text-2); font-family: 'DM Sans', sans-serif; }

/* ── Runway picker pills ───────────────────────────────── */
.rwy-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 0 14px 14px;
}
.rwy-pill {
  padding: 4px 10px;
  border-radius: 4px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  border: 1px solid var(--border);
  background: var(--surf-2);
  color: var(--text-2);
}
.rwy-pill.active {
  background: var(--rwy-dim);
  border-color: var(--rwy);
  color: var(--rwy);
}

/* ── Crosswind bar ─────────────────────────────────────── */
.xw-section {
  padding: 10px 14px 14px;
  border-top: 1px solid var(--border);
}
.xw-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.xw-lbl {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  min-width: 72px;
}
.xw-track {
  flex: 1;
  height: 3px;
  background: var(--surf-3);
  border-radius: 2px;
  overflow: hidden;
}
.xw-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--good);
  transition: width 0.4s ease;
}
.xw-fill.mod { background: var(--warn); }
.xw-fill.hi  { background: var(--danger); }
.xw-val {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  min-width: 36px;
  text-align: right;
}

/* ── Wind card ─────────────────────────────────────────── */
.wind-section {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px;
}
.wind-rose-wrap { flex-shrink: 0; }

.wind-data { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.wind-speed-row { display: flex; align-items: baseline; gap: 6px; }
.wind-spd {
  font-family: 'Rajdhani', sans-serif;
  font-size: 44px;
  font-weight: 700;
  line-height: 1;
  color: var(--wind);
}
.wind-unit { font-size: 16px; color: var(--text-2); font-family: 'DM Sans', sans-serif; }
.wind-gust {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--warn);
}
.wind-dir-row {
  font-size: 13px;
  color: var(--text-2);
  letter-spacing: 0.04em;
}
.wind-raw {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--text-3);
}

/* ── Conditions grid ───────────────────────────────────── */
.cond-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.cond-cell {
  padding: 12px 14px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.cond-cell:nth-child(2n) { border-right: none; }
.cond-cell:nth-last-child(-n+2) { border-bottom: none; }
.cond-lbl {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 4px;
}
.cond-val {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--text-1);
  line-height: 1.1;
}
.cond-val.sm { font-size: 16px; }
.cond-unit { font-size: 11px; color: var(--text-2); font-family: 'DM Sans', sans-serif; }

/* ── METAR card ────────────────────────────────────────── */
.metar-raw {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-2);
  background: var(--bg);
  padding: 12px 14px;
  border-radius: 4px;
  word-break: break-all;
  letter-spacing: 0.02em;
}
.metar-raw .hi { color: var(--accent-hi); }

/* ── Spotter locations ─────────────────────────────────── */
.spot-item {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.spot-item:last-child { border-bottom: none; }
.spot-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text-1);
  margin-bottom: 5px;
}
.spot-name.active { color: var(--rwy); }
.spot-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.spot-tag {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 3px;
  background: var(--surf-3);
  border: 1px solid var(--border);
  color: var(--text-2);
}
.spot-tag.active {
  background: var(--rwy-dim);
  border-color: var(--rwy);
  color: var(--rwy);
}
.spot-desc { font-size: 12px; color: var(--text-2); line-height: 1.55; margin-bottom: 5px; }
.spot-tip { font-size: 11px; color: var(--accent); letter-spacing: 0.01em; }
.spot-tip::before { content: '→ '; }

/* ── Footer ────────────────────────────────────────────── */
.app-footer {
  padding: 16px 0 36px;
  text-align: center;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
}
.app-footer span { color: var(--border-hi); }

/* ── Refresh row ───────────────────────────────────────── */
.refresh-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 2px 8px;
}
.update-ts { font-size: 10px; color: var(--text-3); letter-spacing: 0.06em; }
.refresh-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-2);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 5px 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, color 0.15s;
}
.refresh-btn:active { border-color: var(--accent); color: var(--accent-hi); }

/* ── No data banner ────────────────────────────────────── */
.no-rwy-banner {
  padding: 14px;
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
}

/* ── Flight category badge ─────────────────────────────── */
.cat-badge {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  border-radius: 3px;
}
</style>
</head>

function degToCompass(d) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(d / 22.5) % 16];
}

function getActiveRunway(windDir, windSpd, runways) {
  if (!runways || !runways.length) return null;
  if (windSpd < 3) {
    const r = runways[0];
    return { runway:r, activeEnd:r.end1, activeHdg:r.hdg1, headwind:0, crosswind:0, calm:true };
  }
  let best = null, bestHW = -Infinity;
  for (const rwy of runways) {
    for (const [end, hdg] of [[rwy.end1,rwy.hdg1],[rwy.end2,rwy.hdg2]]) {
      const rad = (windDir - hdg) * Math.PI / 180;
      const hw = windSpd * Math.cos(rad);
      const xw = Math.abs(windSpd * Math.sin(rad));
      if (hw > bestHW) {
        bestHW = hw;
        best = { runway:rwy, activeEnd:end, activeHdg:hdg, headwind:Math.round(hw), crosswind:Math.round(xw), calm:false };
      }
    }
  }
  return best;
}

function allRunwayComponents(windDir, windSpd, runways) {
  if (!runways) return [];
  return runways.flatMap(rwy =>
    [[rwy.end1,rwy.hdg1],[rwy.end2,rwy.hdg2]].map(([end,hdg]) => {
      const rad = (windDir - hdg) * Math.PI / 180;
      const hw = Math.round(windSpd * Math.cos(rad));
      return { end, hw };
    })
  );
}

function getFlightCat(metar) {
  const vis = parseFloat(metar.visib);
  const clouds = metar.clouds || [];
  const ceiling = clouds.find(c => c.cover === 'BKN' || c.cover === 'OVC');
  const ceilFt = ceiling ? ceiling.base * 100 : 99999;
  if (vis >= 5 && ceilFt >= 3000)  return 'VFR';
  if (vis >= 3 && ceilFt >= 1000)  return 'MVFR';
  if (vis >= 1 && ceilFt >= 500)   return 'IFR';
  return 'LIFR';
}

function catColor(cat) {
  return {VFR:'var(--cat-vfr)',MVFR:'var(--cat-mvfr)',IFR:'var(--cat-ifr)',LIFR:'var(--cat-lifr)'}[cat] || 'var(--text-2)';
}

function getCeiling(metar) {
  const clouds = metar.clouds || [];
  if (!clouds.length) return 'CLR';
  const cld = clouds.find(c => c.cover === 'BKN' || c.cover === 'OVC');
  if (cld) return `${cld.cover} ${(cld.base * 100).toLocaleString()}ft`;
  const top = clouds[clouds.length - 1];
  return top ? `${top.cover} ${(top.base * 100).toLocaleString()}ft` : 'CLR';
}

function formatAlt(hpa) {
  const inhg = (hpa * 0.02953).toFixed(2);
  return `${inhg}"`;
}

// WIND ROSE SVG
// ═══════════════════════════════════════════════════════════
function windRoseSVG(windDir, activeHdg) {
  const cx = 50, cy = 50, r = 38;
  const toXY = (deg, radius) => {
    const rad = (deg - 90) * Math.PI / 180;
    return [cx + Math.cos(rad) * radius, cy + Math.sin(rad) * radius];
  };
  const [wx, wy] = toXY(windDir, r * 0.55);
  const [wtx, wty] = toXY(windDir + 180, r * 0.28);
  const [r1x, r1y] = toXY(activeHdg, r * 0.95);
  const [r2x, r2y] = toXY(activeHdg + 180, r * 0.95);
  const [n1,n2] = toXY(0, r+6); const [s1,s2] = toXY(180, r+6);
  const [e1,e2] = toXY(90, r+8); const [w1,w2] = toXY(270, r+8);

  return `<svg viewBox="0 0 100 100" width="90" height="90">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1B3260" stroke-width="1"/>
    <circle cx="${cx}" cy="${cy}" r="${r*0.55}" fill="none" stroke="#1B3260" stroke-width="0.5" stroke-dasharray="2 3"/>
    <text x="${n1.toFixed(1)}" y="${(n2+1.5).toFixed(1)}" text-anchor="middle" fill="#2C5070" font-size="7" font-family="Rajdhani,sans-serif" font-weight="600">N</text>
    <text x="${s1.toFixed(1)}" y="${(s2+1.5).toFixed(1)}" text-anchor="middle" fill="#2C5070" font-size="7" font-family="Rajdhani,sans-serif" font-weight="600">S</text>
    <text x="${(e1+0.5).toFixed(1)}" y="${(e2+2).toFixed(1)}" text-anchor="middle" fill="#2C5070" font-size="7" font-family="Rajdhani,sans-serif" font-weight="600">E</text>
    <text x="${(w1+0.5).toFixed(1)}" y="${(w2+2).toFixed(1)}" text-anchor="middle" fill="#2C5070" font-size="7" font-family="Rajdhani,sans-serif" font-weight="600">W</text>
    <line x1="${r1x.toFixed(1)}" y1="${r1y.toFixed(1)}" x2="${r2x.toFixed(1)}" y2="${r2y.toFixed(1)}"
      stroke="#00CFFF" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    <defs>
      <marker id="wh" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
        <polygon points="0,7 3.5,0 7,7" fill="#7ED4FF"/>
      </marker>
    </defs>
    <line x1="${wty.toFixed(1)}" y1="${wty.toFixed(1)}"
          x1="${wtx.toFixed(1)}" y1="${wty.toFixed(1)}"
          x2="${wx.toFixed(1)}" y2="${wy.toFixed(1)}"
          stroke="#7ED4FF" stroke-width="2.5" stroke-linecap="round" marker-end="url(#wh)"/>
    <line x1="${wtx.toFixed(1)}" y1="${wty.toFixed(1)}"
          x2="${wx.toFixed(1)}" y2="${wy.toFixed(1)}"
          stroke="#7ED4FF" stroke-width="2.5" stroke-linecap="round" marker-end="url(#wh)"/>
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="#7ED4FF"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════════════
// FETCH
// ═══════════════════════════════════════════════════════════
async function fetchMetar(icao) {
  const target = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=json&hours=2`;
  const proxies = [
    target,
    `https://corsproxy.io/?${encodeURIComponent(target)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`,
  ];

  let lastErr = null;
  for (const url of proxies) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) { lastErr = new Error(`HTTP ${res.status}`); continue; }
      const data = await res.json();
      if (!data || !data.length) { lastErr = new Error('No METAR data — check the ICAO code.'); continue; }
      return data[0];
    } catch(e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('All weather sources failed.');
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(metar) {
  const airport = AIRPORTS[currentIcao];
  const windDir = typeof metar.wdir === 'number' ? metar.wdir : null;
  const windSpd = metar.wspd || 0;
  const windGust = metar.wgst || null;
  const calm = windSpd < 3;
  const flightCat = getFlightCat(metar);
  const cc = catColor(flightCat);

  // ── ACTIVE RUNWAY ──
  const runways = airport?.runways || null;
  const activeRwy = runways && windDir !== null ? getActiveRunway(windDir, windSpd, runways) : null;
  const allComps = (runways && windDir !== null && !calm) ? allRunwayComponents(windDir, windSpd, runways) : [];

  let rwyCard = '';
  if (!airport) {
    rwyCard = `<div class="rwy-hero">
      <div class="card-head">
        <span class="card-label">Active Runway</span>
        <span class="card-tag" style="color:${cc};">${flightCat}</span>
      </div>
      <div class="no-rwy-banner">
        Runway data not available for <strong>${currentIcao}</strong>. Weather is shown below.
        Wind direction and speed can be used to manually determine the active runway.
      </div>
    </div>`;
  } else if (activeRwy) {
    const xwPct = Math.min((activeRwy.crosswind / 20) * 100, 100);
    const xwClass = activeRwy.crosswind > 15 ? 'hi' : activeRwy.crosswind > 8 ? 'mod' : '';
    const xwColor = xwClass === 'hi' ? 'var(--danger)' : xwClass === 'mod' ? 'var(--warn)' : 'var(--good)';

    const pillsHtml = allComps.map(c =>
      `<div class="rwy-pill${c.end === activeRwy.activeEnd ? ' active' : ''}">
        ${c.end}&nbsp;<span style="font-size:11px;font-weight:400;">${c.hw>0?'+':''}${c.hw}</span>
      </div>`
    ).join('');

    rwyCard = `<div class="rwy-hero">
      <div class="card-head">
        <span class="card-label">Active Runway</span>
        <span class="cat-badge" style="color:${cc};background:${cc}22;">${flightCat}</span>
      </div>
      <div class="rwy-body">
        <div class="rwy-number-wrap">
          <div class="rwy-number">${activeRwy.activeEnd}</div>
          <div class="rwy-number-sub">${activeRwy.activeHdg}° MAG</div>
        </div>
        <div class="rwy-stats">
          <div class="rwy-stat">
            <span class="rwy-stat-label">Headwind</span>
            <span class="rwy-stat-val">${activeRwy.calm ? '—' : activeRwy.headwind}<span class="rwy-stat-unit">${activeRwy.calm ? '' : ' kt'}</span></span>
          </div>
          <div class="rwy-stat">
            <span class="rwy-stat-label">Crosswind</span>
            <span class="rwy-stat-val">${activeRwy.calm ? '—' : activeRwy.crosswind}<span class="rwy-stat-unit">${activeRwy.calm ? '' : ' kt'}</span></span>
          </div>
        </div>
      </div>
      ${!activeRwy.calm ? `
      <div class="xw-section">
        <div class="xw-row">
          <span class="xw-lbl">X-Wind</span>
          <div class="xw-track"><div class="xw-fill ${xwClass}" style="width:${xwPct.toFixed(0)}%"></div></div>
          <span class="xw-val" style="color:${xwColor};">${activeRwy.crosswind}kt</span>
        </div>
      </div>` : ''}
      <div style="padding:0 14px 12px; border-top: 1px solid var(--border);">
        <div style="font-size:9px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:7px;padding-top:10px;">All runway headwind components</div>
        <div class="rwy-picker">${pillsHtml || '<span style="font-size:11px;color:var(--text-3);">Calm — any runway in use</span>'}</div>
      </div>
    </div>`;
  }

  // ── WIND ──
  const windCard = `<div class="card">
    <div class="card-head">
      <span class="card-label">Wind</span>
      ${calm ? '<span class="card-tag" style="color:var(--good);">CALM / L&V</span>' : ''}
    </div>
    <div class="wind-section">
      ${windDir !== null && !calm
        ? `<div class="wind-rose-wrap">${windRoseSVG(windDir, activeRwy?.activeHdg || 0)}</div>`
        : `<div style="width:90px;height:90px;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:11px;letter-spacing:0.06em;">L&V</div>`}
      <div class="wind-data">
        <div class="wind-speed-row">
          <span class="wind-spd">${windSpd}</span>
          <span class="wind-unit">kt</span>
          ${windGust ? `<span class="wind-gust">G${windGust}</span>` : ''}
        </div>
        <div class="wind-dir-row">${windDir !== null && !calm ? `${windDir}° · ${degToCompass(windDir)}` : 'Light and variable'}</div>
        <div class="wind-raw">${windDir !== null && !calm ? `${String(windDir).padStart(3,'0')}/${String(windSpd).padStart(2,'0')}${windGust?'G'+windGust:''}KT` : 'CALM'}</div>
      </div>
    </div>
  </div>`;

  // ── CONDITIONS ──
  const visStr = metar.visib >= 10 ? '10+' : String(metar.visib);
  const condCard = `<div class="card">
    <div class="card-head"><span class="card-label">Conditions</span></div>
    <div class="cond-grid">
      <div class="cond-cell">
        <div class="cond-lbl">Visibility</div>
        <div class="cond-val">${visStr}<span class="cond-unit"> SM</span></div>
      </div>
      <div class="cond-cell">
        <div class="cond-lbl">Ceiling</div>
        <div class="cond-val sm">${getCeiling(metar)}</div>
      </div>
      <div class="cond-cell">
        <div class="cond-lbl">Temp / Dew</div>
        <div class="cond-val sm">${Math.round(metar.temp)}° / ${Math.round(metar.dewp)}°<span class="cond-unit">C</span></div>
      </div>
      <div class="cond-cell">
        <div class="cond-lbl">Altimeter</div>
        <div class="cond-val sm">${formatAlt(metar.altim)}<span class="cond-unit"> Hg</span></div>
      </div>
    </div>
  </div>`;

  // ── RAW METAR ──
  const raw = metar.rawOb || 'No raw METAR available';
  const metarCard = `<div class="card">
    <div class="card-head">
      <span class="card-label">Raw METAR</span>
      <span class="card-tag">${metar.reportTime ? metar.reportTime.slice(11,16)+'Z' : ''}</span>
    </div>
    <div style="padding:12px 14px;">
      <div class="metar-raw">${raw}</div>
    </div>
  </div>`;

  // ── SPOTTER LOCATIONS ──
  let spotterCard = '';
  if (airport?.spotterLocations?.length) {
    const activeEnd = activeRwy?.activeEnd;
    const sorted = [...airport.spotterLocations].sort((a,b) => {
      const am = a.runways?.includes(activeEnd) ? -1 : 1;
      const bm = b.runways?.includes(activeEnd) ? -1 : 1;
      return am - bm;
    });
    const items = sorted.map(loc => {
      const relevant = activeEnd && loc.runways?.includes(activeEnd);
      const tagHtml = (loc.runways||[]).map(r =>
        `<span class="spot-tag${r===activeEnd?' active':''}">${r}</span>`
      ).join('');
      return `<div class="spot-item">
        <div class="spot-name${relevant?' active':''}">${relevant?'★ ':''}${loc.name}</div>
        <div class="spot-tags">${tagHtml}</div>
        <div class="spot-desc">${loc.desc}</div>
        <div class="spot-tip">${loc.tip}</div>
      </div>`;
    }).join('');
    spotterCard = `<div class="card">
      <div class="card-head">
        <span class="card-label">Spotter Locations</span>
        <span class="card-tag">${activeEnd ? 'RWY '+activeEnd+' first' : currentIcao}</span>
      </div>
      <div>${items}</div>
    </div>`;
  }

  // ── REFRESH ROW ──
  const ts = metar.reportTime ? metar.reportTime.slice(0,16).replace('T',' ')+'Z' : '';
  const refreshRow = `<div class="refresh-row">
    <span class="update-ts">Updated ${ts}</span>
    <button class="refresh-btn" onclick="loadAirport('${currentIcao}')">↻ Refresh</button>
  </div>`;

  document.getElementById('mainContent').innerHTML =
    rwyCard + windCard + condCard + metarCard + spotterCard + refreshRow +
    `<div class="app-footer">FinalPass · <span>CF Black Aviation</span></div>`;
}

// ═══════════════════════════════════════════════════════════
// LOAD AIRPORT
// ═══════════════════════════════════════════════════════════
async function loadAirport(icao) {
  icao = icao.toUpperCase().trim();
  currentIcao = icao;
  localStorage.setItem('fp_airport', icao);

  const airport = AIRPORTS[icao];
  document.getElementById('tbIcao').textContent = icao;
  document.getElementById('tbName').textContent = airport ? airport.name : 'Unknown Airport';

  document.getElementById('mainContent').innerHTML = `
    <div class="loading-state">
      <div class="pulse-ring"></div>
      <div class="loading-text">Fetching weather · ${icao}</div>
    </div>`;

  try {
    const metar = await fetchMetar(icao);
    render(metar);
  } catch(err) {
    document.getElementById('mainContent').innerHTML = `
      <div class="loading-state">
        <div style="font-size:28px;">⚠</div>
        <div class="loading-text" style="color:var(--danger);">Weather fetch failed</div>
        <div style="font-size:12px;color:var(--text-3);text-align:center;max-width:260px;">${err.message}</div>
        <button class="refresh-btn" onclick="loadAirport('${icao}')" style="margin-top:8px;">↻ Retry</button>
      </div>`;
  }
}

// ═══════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════
function openSearch() {
  document.getElementById('searchOverlay').classList.add('open');
  document.getElementById('searchInput').value = '';
  renderSearchResults('');
  setTimeout(() => document.getElementById('searchInput').focus(), 150);
}

function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
}

function renderSearchResults(q) {
  const query = q.toUpperCase().trim();
  const label = document.getElementById('searchSectionLabel');
  const results = query.length === 0
    ? (label.textContent = 'All airports', AIRPORT_LIST.slice(0, 30))
    : (label.textContent = `Results for "${q.toUpperCase()}"`,
       AIRPORT_LIST.filter(a =>
         a.icao.includes(query) ||
         a.name.toUpperCase().includes(query) ||
         a.city.toUpperCase().includes(query)
       ).slice(0, 20));

  document.getElementById('searchResults').innerHTML = results.length
    ? results.map(a => `
        <div class="search-result" onclick="selectAirport('${a.icao}')">
          <div>
            <div class="sr-icao">${a.icao}</div>
            <div class="sr-name">${a.name}</div>
            <div class="sr-city">${a.city}</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </div>`).join('')
    : `<div style="padding:32px 16px;text-align:center;color:var(--text-3);font-size:13px;">
        No airports found. Try an ICAO code directly.
      </div>`;
}

function selectAirport(icao) {
  closeSearch();
  loadAirport(icao);
}

const si = document.getElementById('searchInput');
si.addEventListener('input', e => renderSearchResults(e.target.value));
si.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeSearch(); return; }
  if (e.key === 'Enter') {
    const v = e.target.value.trim().toUpperCase();
    if (v.length >= 3) selectAirport(v);
  }
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
loadAirport(currentIcao);
</script>
</body>
</html>
